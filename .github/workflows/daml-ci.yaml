name: Daml CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SDK_VERSION: 3.5.2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip

      - name: Install DPM
        run: |
          curl https://get.digitalasset.com/install/install.sh | sh
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"

      - name: Verify DPM installation
        run: |
          # dpm version
          echo "dpm version"
          dpm --version 
          # the Daml SDK version
          echo "DAML SDK version"
          dpm version

      - name: Build all Daml packages
        run: |
          dpm build --all

      - name: Test all Daml packages
        run: |
          set -euo pipefail
          grep -E '^- ' multi-package.yaml | sed 's/^- //' | while IFS= read -r pkg; do
            echo "==> Testing $pkg"
            DAML_PACKAGE="$pkg" dpm test
          done
